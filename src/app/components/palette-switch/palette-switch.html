<div class="palette-switch" aria-label="Palette switch">
  @for (option of palettes; track option.id) {
    <button
      type="button"
      class="palette-button"
      [class.active]="palette.palette() === option.id"
      [attr.aria-pressed]="palette.palette() === option.id"
      [attr.aria-label]="option.label"
      [title]="option.label"
      [style.--palette-a]="option.colors[0]"
      [style.--palette-b]="option.colors[1]"
      (click)="palette.setPalette(option.id)"
    >
      <span class="palette-swatch"></span>
    </button>
  }
</div>
