<div class="portfolio-shell">
  <vc-loading-overlay
    [active]="routerLoading.isVisible()"
    [label]="i18n.t('shell.routeLoading')"
  />

  <header class="site-header" [attr.aria-label]="i18n.t('shell.navigation')">
    <vc-theme-toggle />
    <vc-menu />
    <vc-language-toggle />
  </header>

  <main class="page-content">
    <router-outlet />
  </main>

  <footer class="site-footer">
    <span class="footer-copy">Veronica Ciolfi @ 2026</span>
    <vc-palette-switch />
  </footer>
</div>
