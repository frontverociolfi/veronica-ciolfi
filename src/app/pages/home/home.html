<section class="hero" id="home" aria-labelledby="intro-title">
  <p class="eyebrow">
    <span aria-hidden="true"></span>
    {{ i18n.t('home.eyebrow') }}
  </p>

  <h1 id="intro-title">
    Veronica <span>Ciolfi.</span>
  </h1>
</section>

<section class="home-layout">
  <div class="grid-row grid-row-primary">
    <vc-home-logo-tile class="logo"></vc-home-logo-tile>
    <vc-home-intro-card class="intro"></vc-home-intro-card>
    <vc-home-portrait-card class="portrait"></vc-home-portrait-card>
  </div>

  <div class="grid-row grid-row-secondary">
    <vc-home-skills-card
      class="skills"
      [skillsLeft]="skills"
      [skillsRight]="skills2">
    </vc-home-skills-card>
    <vc-home-resume-card
      class="resume"
      [resumePdfUrl]="resumePdfUrl">
    </vc-home-resume-card>
  </div>

  <div class="grid-row grid-row-content">
    <vc-home-latest-projects-card
      class="latest-projects"
      [projects]="latestProjects()">
    </vc-home-latest-projects-card>
    <vc-home-latest-posts-card
      class="latest-posts"
      [posts]="latestPosts()">
    </vc-home-latest-posts-card>
  </div>

  <div class="grid-row grid-row-final">
    <vc-home-experience-card
      class="experience"
      [experience]="experience">
    </vc-home-experience-card>

    <div class="utility-panel">
      <vc-home-stack-card
        class="stack"
        [stack]="stack">
      </vc-home-stack-card>

      <div class="utility-links">
        <vc-home-social-card
          class="social"
          [linkedinUrl]="linkedinUrl">
        </vc-home-social-card>
        <vc-home-whatsapp-card
          class="whatsapp"
          [whatsappUrl]="whatsappUrl">
        </vc-home-whatsapp-card>
        <vc-home-meeting-card
          class="meeting"
          [meetingUrl]="meetingUrl">
        </vc-home-meeting-card>
      </div>
    </div>
  </div>
</section>
