<a
  class="resume-card"
  [href]="resumePdfUrl"
  target="_blank"
  rel="noopener noreferrer"
  [attr.aria-label]="i18n.t('home.resumeAria')"
>
  <h2>{{ i18n.t('home.resumeTitle') }}</h2>
  <p>{{ i18n.t('home.resumeText') }}</p>
  <div class="resume-footer">
    <span class="cta"><ng-icon name="heroArrowUpRight" size="24px" aria-hidden="true" /></span>
  </div>
</a>
