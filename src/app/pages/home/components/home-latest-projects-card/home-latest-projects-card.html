<article class="latest-card" [attr.aria-label]="i18n.t('home.latestProjectsAria')">
  <div class="card-head">
    <span class="label">
      <span></span>
      {{ i18n.t('home.latestProjectsLabel') }}
    </span>

    <a class="card-link" routerLink="/projects">{{ i18n.t('home.latestProjectsCta') }}</a>
  </div>

  <h2>{{ i18n.t('home.latestProjectsTitle') }}</h2>

  <div class="item-list">
    @for (project of projects; track project.slug) {
      <a class="item-card" [routerLink]="project.href">
        <div class="item-copy">
          <strong>{{ project.name }}</strong>
          <p>{{ project.summary }}</p>
        </div>

        <div class="item-pills">
          @for (technology of project.technologies; track technology) {
            <span>{{ technology }}</span>
          }
        </div>
      </a>
    }
  </div>
</article>
