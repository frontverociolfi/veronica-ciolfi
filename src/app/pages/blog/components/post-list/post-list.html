<section class="post-list" [attr.aria-label]="i18n.t('blog.listAria')">
  @for (post of posts; track post.slug) {
    <article class="post-card">
      <div class="post-cover" aria-hidden="true">
        <span>{{ post.cover }}</span>
      </div>

      <div class="post-body">
        <div class="post-meta">
          <span class="post-category">{{ post.category }}</span>
          <span>{{ post.publishedAt | date: 'MMM d, y' }}</span>
          <span>{{ post.readingTime }}</span>
        </div>

        <h2>{{ post.title }}</h2>
        <p>{{ post.excerpt }}</p>

        <a class="post-link" [routerLink]="['/blog', post.slug]">{{ i18n.t('blog.readPost') }}</a>
      </div>
    </article>
  }
</section>
